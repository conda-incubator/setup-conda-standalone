default_install_hook_types: [pre-commit, pre-push]
exclude: ^dist/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    # This points to a revision on the main branch where a fix has been added such that it works also for Windows
    rev: 7b8bca6012218d6804e586523b246cd0a8eb02a1
    hooks:
      - id: yamlfmt
        exclude: ^pnpm-lock\.yaml$
        args: [--mapping, '2', --offset, '2', --sequence, '4', --implicit_start]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: f805888065fdb6162e1f800e50bb9460cbd223d6  # frozen: 0.37.2
    hooks:
      - id: check-github-workflows
        files: \.github/workflows/.*\.yaml

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: tsc
        name: Type check
        files: \.(mts|ts|js|json|mjs|cjs)$
        entry: pnpm type-check
        language: system
        pass_filenames: false

      - id: lint
        name: Linting
        files: \.(mts|ts|js|json|mjs|cjs)$
        entry: pnpm lint-fix
        language: system
        pass_filenames: false

      - id: compile
        name: Compile bundle
        files: \.(mts|ts|js|mjs|cjs)$
        entry: bash -c 'pnpm compile && git diff --quiet dist/'
        language: system
        pass_filenames: false
        stages: [pre-push]
