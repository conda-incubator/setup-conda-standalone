name: Test setup-conda-standalone

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

permissions: {}

concurrency:
  # Concurrency group that uses the workflow name and PR number if available
  # or commit SHA as a fallback. If a new build is triggered under that
  # concurrency group while a previous build is running it will be canceled.
  # Repeated pushes to a PR will cancel all previous builds, while multiple
  # merges to main will not cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          cache: true
          run_install: true

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files --hook-stage pre-commit --hook-stage pre-push


  unit-test:
    name: Run unit tests
    needs: lint
    strategy:
      matrix:
        runner: [ubuntu-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          cache: true
          run_install: true

      - name: Run unit tests
        run: pnpm test

      - name: Check coverage
        run: |
          COVERAGE=$(jq '.total | [.[].pct] | min' coverage/coverage-summary.json)
          if ! [[ ${COVERAGE} -eq 100 ]]; then
            echo "::error::Coverage is not 100% (currently: ${COVERAGE}%)."
            exit 1
          fi
        shell: bash


  integration-test:
    name: Run integration tests
    needs: lint
    strategy:
      matrix:
        build: [single, onedir]
        runner: [ubuntu-latest]
    runs-on: ${{ matrix.runner }}
    env:
      BUILD_VARIANT: ${{ matrix.build }}
      CONDA_VERSION: 25.9.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup conda-standalone
        uses: ./
        with:
          build-string: '*${{ env.BUILD_VARIANT }}*'
          channel: main
          conda-standalone-version: ${{ env.CONDA_VERSION }}
          destination-directory: ${{ runner.temp }}/conda_standalone

      - name: Run integration tests
        run: |
          import json
          import os
          import subprocess
          from pathlib import Path

          conda_exe = Path(os.environ.get("CONDA_EXE"))
          internal_dir = conda_exe.parent / "_internal"
          is_onedir = os.environ.get("BUILD_VARIANT") == "onedir"
          assert conda_exe.is_file()
          assert internal_dir.is_dir() == is_onedir

          proc = subprocess.run(
              [conda_exe, "info", "--json"],
              check=True,
              text=True,
              capture_output=True,
          )
          assert not proc.stderr
          assert proc.returncode == 0
          info_output = json.loads(proc.stdout)
          assert info_output.get("conda_version") == os.environ.get("CONDA_VERSION")
        shell: python
